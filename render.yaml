services:
  - type: web
    name: refinekeyboard-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-nano
      - key: REFINE_MAX_REQUESTS_PER_MINUTE
        value: "30"
      - key: REFINE_APP_SECRET
        sync: false
